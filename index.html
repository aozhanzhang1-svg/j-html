<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仓库人员管理系统</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
body {display:flex;height:100vh;background:#f5f7fa;}
.sidebar {width:180px;background:#2d3748;padding-top:40px;flex-shrink:0;}
.nav-btn {display:block;width:90%;margin:10px auto;padding:14px;border:none;background:#4a5568;color:white;font-size:16px;border-radius:6px;cursor:pointer;}
.nav-btn.active {background:#3182ce;}
.nav-btn:hover {background:#5a6878;}
.nav-btn.active:hover {background:#2b6cb0;}
.main {flex:1;padding:30px;overflow:auto;}
.page {display:none;}
.page.show {display:block;}
h2 {margin-bottom:25px;color:#2d3748;}
.hint {font-size:13px;color:#a0aec0;margin-bottom:16px;}

/* 仓库 */
.warehouse-box {display:grid;grid-template-columns:repeat(auto-fill,180px);gap:20px;margin-bottom:30px;}
.goods-item {background:white;padding:15px;border-radius:8px;text-align:center;box-shadow:0 2px 8px #ddd;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.goods-item:hover {transform:translateY(-3px);box-shadow:0 4px 16px #bbb;}
.goods-icon {font-size:48px;margin-bottom:8px;}
.goods-name {font-size:15px;color:#2d3748;margin-bottom:4px;}
.goods-stock {font-size:14px;color:#718096;}

/* 人员 */
.staff-box {display:grid;grid-template-columns:repeat(auto-fill,140px);gap:16px;margin-bottom:30px;}
.person-card {background:white;width:140px;padding:16px;border-radius:10px;text-align:center;box-shadow:0 2px 8px #ddd;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.person-card:hover {transform:translateY(-3px);box-shadow:0 4px 16px #bbb;}
.person-ani {font-size:50px;margin-bottom:8px;animation:walk 2s infinite alternate;}
@keyframes walk {from{transform:translateY(0)}to{transform:translateY(-6px)}}
.status-morning {color:#2f855a;font-size:14px;}
.status-night {color:#c53030;font-size:14px;}
.status-all {color:#3182ce;font-size:14px;}
.status-off {color:#a0aec0;font-size:14px;}

/* 弹窗 */
.modal-overlay {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);justify-content:center;align-items:center;z-index:999;}
.modal-overlay.show {display:flex;}
.modal {background:white;padding:30px;border-radius:12px;min-width:320px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.modal h3 {margin-bottom:20px;color:#2d3748;}
.modal label {display:block;margin-bottom:6px;color:#4a5568;font-size:14px;}
.modal input,.modal select {width:100%;padding:10px 12px;margin-bottom:16px;border:1px solid #cbd5e0;border-radius:6px;font-size:15px;}
.modal-btns {display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
.modal-btns button {padding:10px 24px;border:none;border-radius:6px;font-size:15px;cursor:pointer;}
.btn-save {background:#3182ce;color:white;}
.btn-save:hover {background:#2b6cb0;}
.btn-cancel {background:#e2e8f0;color:#2d3748;}
.btn-cancel:hover {background:#cbd5e0;}

/* 表格 */
.table-wrap {background:white;border-radius:10px;box-shadow:0 2px 8px #ddd;overflow:auto;}
table {width:100%;border-collapse:collapse;font-size:14px;}
th {background:#2d3748;color:white;padding:12px 16px;text-align:left;position:sticky;top:0;}
td {padding:10px 16px;border-bottom:1px solid #e2e8f0;}
tbody tr:hover {background:#edf2f7;}
code {background:#edf2f7;padding:2px 8px;border-radius:4px;font-size:13px;}

/* 按钮 */
.btn-green {padding:10px 20px;background:#38a169;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
.btn-green:hover {background:#2f855a;}
.btn-blue {padding:10px 20px;background:#3182ce;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
.btn-blue:hover {background:#2b6cb0;}
.btn-red {padding:10px 20px;background:#e53e3e;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
.btn-red:hover {background:#c53030;}
.btn-gray {padding:10px 20px;background:#718096;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
.btn-gray:hover {background:#4a5568;}
.btn-sm {padding:4px 12px;border:none;border-radius:4px;font-size:12px;cursor:pointer;margin-right:4px;}
.btn-sm-edit {background:#3182ce;color:white;}
.btn-sm-edit:hover {background:#2b6cb0;}
.btn-sm-del {background:#e53e3e;color:white;}
.btn-sm-del:hover {background:#c53030;}
.btn-sm-gray {background:#a0aec0;color:white;}

/* 表单 */
.card-form {display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end;}
.card-form label {font-size:14px;color:#4a5568;display:block;margin-bottom:4px;}
.card-form input {padding:10px 12px;border:1px solid #cbd5e0;border-radius:6px;font-size:15px;width:180px;}
.card-form .btn-add {padding:10px 24px;background:#38a169;color:white;border:none;border-radius:6px;cursor:pointer;font-size:15px;height:42px;}
.card-form .btn-add:hover {background:#2f855a;}
.inline-edit input {padding:4px 8px;border:1px solid #3182ce;border-radius:4px;font-size:13px;}

/* 统计条 */
.stat-bar {padding:15px;border-radius:8px;font-size:18px;font-weight:bold;margin-top:16px;}
.stat-cyan {background:#e6fffa;color:#006d77;}
.stat-blue {background:#f0f4ff;color:#2c5282;}

/* Toast & Loading */
.toast {position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2f855a;color:white;padding:12px 28px;border-radius:8px;font-size:15px;opacity:0;transition:opacity .3s;z-index:1000;pointer-events:none;}
.toast.show {opacity:1;}
.loading-overlay {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.75);justify-content:center;align-items:center;z-index:1001;font-size:18px;color:#2d3748;}
.loading-overlay.show {display:flex;}
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <button class="nav-btn active" onclick="switchPage('warehouse')">可视化仓库</button>
  <button class="nav-btn" onclick="switchPage('staff')">人员到岗</button>
  <button class="nav-btn" onclick="switchPage('swipe')">📡 刷卡记录</button>
  <button class="nav-btn" onclick="switchPage('cards')">💳 卡片绑定</button>
</div>

<div class="main">

  <!-- 页面1：仓库 -->
  <div id="warehouse" class="page show">
    <h2>仓库货物货架</h2>
    <p class="hint">💡 点击货物卡片可修改名称和库存</p>
    <div class="warehouse-box" id="warehouseBox"></div>
    <div class="stat-bar stat-cyan">当前仓库货物总数量：<span id="allNum">0</span> 件</div>
  </div>

  <!-- 页面2：人员到岗 -->
  <div id="staff" class="page">
    <h2>员工今日到岗状态</h2>
    <p class="hint">💡 点击人员卡片可修改到岗状态</p>
    <div class="staff-box" id="staffBox"></div>
    <div class="stat-bar stat-blue">
      今日到岗总人数：<span id="staffCount">0</span> 人（共 <span id="staffTotal">0</span> 人）
    </div>
    <button class="btn-red" style="margin-top:16px;" onclick="resetAllData()">🔄 恢复默认数据</button>
  </div>

  <!-- 页面3：刷卡记录 -->
  <div id="swipe" class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
      <h2 style="margin-bottom:0;">📡 RFID 刷卡记录</h2>
      <div style="display:flex;gap:10px;">
        <button class="btn-green" onclick="exportXLS()">📥 导出 Excel</button>
        <button class="btn-gray" onclick="exportCSV()">📄 导出 CSV</button>
        <button class="btn-blue" onclick="refreshSwipes()">🔄 刷新</button>
        <button class="btn-red" onclick="clearAllSwipes()">🗑 清空</button>
      </div>
    </div>
    <p class="hint">💡 ESP32 通过 POST /api/swipe 推送刷卡数据，云端最多 500 条，建议定期导出 Excel 后清空</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>卡号</th><th>姓名</th><th>刷卡时间</th></tr></thead>
        <tbody id="swipeBody"><tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:40px;">暂无刷卡记录</td></tr></tbody>
      </table>
    </div>
    <div class="stat-bar stat-blue">总刷卡次数：<span id="swipeTotal">0</span> 次</div>
  </div>

  <!-- 页面4：卡片绑定 -->
  <div id="cards" class="page">
    <h2>💳 卡片绑定管理</h2>
    <p class="hint">💡 绑定后刷卡自动识别姓名（数据存浏览器本地，不怕关机）</p>
    <div class="card-form">
      <div><label>卡号 UID</label><input type="text" id="newCardId" placeholder="如: 4A 8B 32 16"></div>
      <div><label>姓名（可中文）</label><input type="text" id="newCardName" placeholder="如: 副官"></div>
      <button class="btn-add" onclick="addCard()">➕ 添加</button>
    </div>
    <div class="table-wrap" style="margin-bottom:20px;">
      <table>
        <thead><tr><th>#</th><th>卡号 UID</th><th>姓名</th><th>操作</th></tr></thead>
        <tbody id="cardsBody"><tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:40px;">暂无绑定</td></tr></tbody>
      </table>
    </div>
    <div class="stat-bar stat-blue">已绑定：<span id="cardsTotal">0</span> 张</div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">编辑</h3>
    <div id="modalBody"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="modalSave">保存</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">⏳ 同步数据中...</div>
<div class="toast" id="toast"></div>

<script>
// ========================= 常量 & 默认数据 =========================
const LS = {
  stock: 'rfid_stock',      // 货物+人员数据
  swipes: 'rfid_swipes',
  swipesTime: 'rfid_swipes_time',
  cards: 'rfid_cards',
};

const DEFAULT_GOODS = [
  { icon:'📦', name:'钢材原料', stock:126 },
  { icon:'🔩', name:'标准钢球', stock:890 },
  { icon:'🛠️', name:'铸造模具', stock:32 },
  { icon:'⚙️', name:'机械配件', stock:157 },
  { icon:'🪨', name:'铸造砂料', stock:640 },
  { icon:'🧰', name:'维修工具', stock:48 },
];

const DEFAULT_STAFF = [
  { icon:'👷', name:'鸡大强', status:'morning' },{ icon:'👷‍♂️', name:'鸡大国', status:'night' },
  { icon:'👷‍♀️', name:'鸡大梅', status:'all' },{ icon:'🧑‍🏭', name:'鸡大海', status:'morning' },
  { icon:'👷', name:'鸡大山', status:'night' },{ icon:'👷‍♂️', name:'鸡大刚', status:'all' },
  { icon:'👷‍♀️', name:'鸡大芬', status:'morning' },{ icon:'🧑‍🏭', name:'鸡大军', status:'night' },
  { icon:'👷', name:'鸡大林', status:'all' },{ icon:'👷‍♂️', name:'鸡大忠', status:'morning' },
  { icon:'👷‍♀️', name:'鸡大秀', status:'night' },{ icon:'🧑‍🏭', name:'鸡大福', status:'all' },
  { icon:'👷', name:'鸡大荣', status:'morning' },{ icon:'👷‍♂️', name:'鸡大伟', status:'night' },
  { icon:'👷‍♀️', name:'鸡大莲', status:'all' },{ icon:'🧑‍🏭', name:'鸡大斌', status:'morning' },
  { icon:'👷', name:'鸡大彪', status:'night' },{ icon:'👷‍♂️', name:'鸡大祥', status:'all' },
  { icon:'👷‍♀️', name:'鸡大芝', status:'morning' },{ icon:'🧑‍🏭', name:'鸡大坤', status:'night' },
  { icon:'👷', name:'鸡小宇', status:'all' },{ icon:'👷‍♂️', name:'鸡小航', status:'morning' },
  { icon:'👷‍♀️', name:'鸡小婷', status:'night' },{ icon:'🧑‍🏭', name:'鸡小泽', status:'all' },
  { icon:'👷', name:'鸡小豪', status:'morning' },{ icon:'👷‍♂️', name:'鸡小凯', status:'night' },
  { icon:'👷‍♀️', name:'鸡小冉', status:'all' },{ icon:'🧑‍🏭', name:'鸡小辰', status:'morning' },
  { icon:'👷', name:'鸡小硕', status:'night' },{ icon:'👷‍♂️', name:'鸡小杨', status:'all' },
  { icon:'👷‍♀️', name:'鸡小诺', status:'morning' },{ icon:'🧑‍🏭', name:'鸡小峰', status:'night' },
  { icon:'👷', name:'鸡小恒', status:'all' },{ icon:'👷‍♂️', name:'鸡小乐', status:'morning' },
  { icon:'👷‍♀️', name:'鸡小晴', status:'night' },{ icon:'🧑‍🏭', name:'鸡小川', status:'all' },
  { icon:'👷', name:'鸡小帆', status:'morning' },{ icon:'👷‍♂️', name:'鸡小源', status:'night' },
  { icon:'👷‍♀️', name:'鸡小萱', status:'all' },{ icon:'🧑‍🏭', name:'鸡小炎', status:'morning' },
];

const STATUS_MAP = {
  morning:{text:'早上到岗',cls:'status-morning'},
  night:{text:'晚上到岗',cls:'status-night'},
  all:{text:'全天在岗',cls:'status-all'},
  off:{text:'未到岗',cls:'status-off'},
};

// ========================= 全局状态 =========================
let data = {
  goods: JSON.parse(JSON.stringify(DEFAULT_GOODS)),
  staff: JSON.parse(JSON.stringify(DEFAULT_STAFF)),
};
let swipesData = [];
let cardsData = [];

// ========================= 工具函数 =========================
const $ = id => document.getElementById(id);
const esc = str => { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; };
const fmtTime = t => (t||'').replace('T',' ').replace(/\.\d{3}Z/,'').replace('Z','');
const timestamp = () => { const n=new Date(),p=x=>String(x).padStart(2,'0'); return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}_${p(n.getHours())}-${p(n.getMinutes())}-${p(n.getSeconds())}`; };
const normId = id => (id||'').replace(/[\s\-_]/g,'').toUpperCase();

function showToast(msg) { const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function showLoading() { $('loadingOverlay').classList.add('show'); }
function hideLoading() { $('loadingOverlay').classList.remove('show'); }

// ========================= 本地存储 =========================
function loadLocal(key) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch(e){return null;} }
function saveLocal(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

// 货物+人员
function loadStockLocal() {
  const v = loadLocal(LS.stock);
  if (v && v.goods) { data.goods = v.goods; data.staff = v.staff; renderWarehouse(); renderStaff(); return true; }
  return false;
}
function saveStockLocal() { saveLocal(LS.stock, { goods:data.goods, staff:data.staff }); }

// 刷卡记录
function loadSwipesLocal() {
  const v = loadLocal(LS.swipes);
  if (Array.isArray(v) && v.length) { swipesData = v; renderSwipes(); return true; }
  return false;
}
function saveSwipesLocal() { saveLocal(LS.swipes, swipesData); saveLocal(LS.swipesTime, new Date().toISOString()); }

// 卡片绑定
function loadCardsLocal() {
  const v = loadLocal(LS.cards);
  if (Array.isArray(v)) { cardsData = v; renderCards(); return true; }
  return false;
}
function saveCardsLocal() { saveLocal(LS.cards, cardsData); }

// 纯前端卡号→姓名查表
function lookupName(cardId) {
  const n = normId(cardId);
  const c = cardsData.find(x => normId(x.cardId) === n);
  return c ? c.name : null;
}

// ========================= API 调用 =========================
async function api(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||`${res.status}`); }
  return res.json();
}

async function fetchStock() { return api('/api/stock'); }
async function saveStock(goods, staff) { return api('/api/stock', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({goods,staff}) }); }
async function fetchSwipes() { const r = await api('/api/swipe'); return r.swipes||[]; }
async function fetchCards() { const r = await api('/api/cards'); return r.cards||[]; }

// ========================= 仓库页面 =========================
function renderWarehouse() {
  const box = $('warehouseBox');
  box.innerHTML = data.goods.map((g,i) => `
    <div class="goods-item" onclick="editGoods(${i})">
      <div class="goods-icon">${g.icon}</div>
      <div class="goods-name">${esc(g.name)}</div>
      <div class="goods-stock">库存：${g.stock}</div>
    </div>`).join('');
  $('allNum').textContent = data.goods.reduce((s,g)=>s+Number(g.stock),0);
}

// ========================= 人员页面 =========================
function renderStaff() {
  const box = $('staffBox');
  box.innerHTML = data.staff.map((p,i) => {
    const s = STATUS_MAP[p.status]||STATUS_MAP.off;
    return `<div class="person-card" onclick="editStaff(${i})">
      <div class="person-ani">${p.icon}</div><h4>${esc(p.name)}</h4><p class="${s.cls}">${s.text}</p></div>`;
  }).join('');
  $('staffCount').textContent = data.staff.filter(p=>p.status!=='off').length;
  $('staffTotal').textContent = data.staff.length;
}

// ========================= 刷卡记录页面 =========================
function renderSwipes() {
  const tbody = $('swipeBody');
  if (!swipesData.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:40px;">暂无刷卡记录</td></tr>';
  } else {
    tbody.innerHTML = swipesData.map((s,i) => {
      const name = lookupName(s.cardId) || s.name || '-';
      return `<tr><td>${swipesData.length-i}</td><td><code>${esc(s.cardId)}</code></td><td><strong>${esc(name)}</strong></td><td>${esc(fmtTime(s.time))}</td></tr>`;
    }).join('');
  }
  $('swipeTotal').textContent = swipesData.length;
}

async function refreshSwipes() {
  showLoading();
  swipesData = await fetchSwipes();
  renderSwipes();
  saveSwipesLocal();
  hideLoading();
  showToast('已刷新');
}

async function clearAllSwipes() {
  if (!confirm('⚠️ 确定清空云端全部刷卡记录？\n\n建议先导出 Excel 备份！')) return;
  showLoading();
  await fetch('/api/swipe',{method:'DELETE'});
  swipesData = [];
  renderSwipes();
  saveSwipesLocal();
  hideLoading();
  showToast('云端已清空，本地缓存仍在');
}

// ========================= 导出（用本地卡片绑定查中文名！） =========================
function buildExportRows() {
  return swipesData.map((s,i) => {
    const name = lookupName(s.cardId) || s.name || '';
    const time = fmtTime(s.time);
    return { i:i+1, cardId:s.cardId, name, time };
  });
}

function exportCSV() {
  if (!swipesData.length) { showToast('没有数据可导出'); return; }
  const rows = buildExportRows();
  const BOM = '﻿';
  const hdr = '序号,卡号,姓名,刷卡时间\n';
  const body = rows.map(r => `${r.i},"${r.cardId}","${r.name}","${r.time}"`).join('\n');
  const blob = new Blob([BOM + hdr + body], { type:'text/csv;charset=utf-8;' });
  download(blob, `刷卡记录_${timestamp()}.csv`);
  showToast(`已导出 ${rows.length} 条 (CSV)`);
}

function exportXLS() {
  if (!swipesData.length) { showToast('没有数据可导出'); return; }
  const rows = buildExportRows();
  const body = rows.map(r => `<tr><td>${r.i}</td><td>${esc(r.cardId)}</td><td>${esc(r.name)}</td><td>${esc(r.time)}</td></tr>`).join('');
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>刷卡记录</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head>
<body><table border="1"><tr><th>序号</th><th>卡号</th><th>姓名</th><th>刷卡时间</th></tr>${body}</table></body></html>`;
  const blob = new Blob(['﻿' + html], { type:'application/vnd.ms-excel;charset=utf-8;' });
  download(blob, `刷卡记录_${timestamp()}.xls`);
  showToast(`已导出 ${rows.length} 条 (Excel)`);
}

function download(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ========================= 卡片绑定页面 =========================
function renderCards() {
  const tbody = $('cardsBody');
  if (!cardsData.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:40px;">暂无绑定</td></tr>';
  } else {
    tbody.innerHTML = cardsData.map((c,i) => `
      <tr>
        <td>${i+1}</td>
        <td><code>${esc(c.cardId)}</code></td>
        <td id="cn-${i}">
          <span id="cnt-${i}">${esc(c.name)}</span>
          <input id="cni-${i}" type="text" value="${esc(c.name)}" style="display:none;padding:4px 8px;border:1px solid #3182ce;border-radius:4px;font-size:13px;width:120px;">
        </td>
        <td>
          <button class="btn-sm btn-sm-edit" id="ceb-${i}" onclick="startEditCard(${i})">✏️</button>
          <button class="btn-sm btn-sm-edit" id="csb-${i}" onclick="saveEditCard(${i})" style="display:none;">💾</button>
          <button class="btn-sm btn-sm-gray" id="ccb-${i}" onclick="cancelEditCard(${i})" style="display:none;">取消</button>
          <button class="btn-sm btn-sm-del" onclick="deleteCard(${i})">🗑</button>
        </td>
      </tr>`).join('');
  }
  $('cardsTotal').textContent = cardsData.length;
}

function startEditCard(i) {
  $(`cnt-${i}`).style.display='none';
  $(`cni-${i}`).style.display='inline-block';
  $(`ceb-${i}`).style.display='none';
  $(`csb-${i}`).style.display='inline-block';
  $(`ccb-${i}`).style.display='inline-block';
  $(`cni-${i}`).focus();
}

function cancelEditCard(i) {
  $(`cnt-${i}`).style.display='inline';
  $(`cni-${i}`).style.display='none';
  $(`ceb-${i}`).style.display='inline-block';
  $(`csb-${i}`).style.display='none';
  $(`ccb-${i}`).style.display='none';
  $(`cni-${i}`).value = cardsData[i].name;
}

async function saveEditCard(i) {
  const name = $(`cni-${i}`).value.trim();
  if (!name) { showToast('姓名不能为空'); return; }
  cardsData[i].name = name;
  saveCardsLocal();
  await fetch('/api/cards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:cardsData[i].cardId,name})});
  cancelEditCard(i);
  $(`cnt-${i}`).textContent = name;
  renderSwipes();
  showToast('已更新 ✓');
}

async function addCard() {
  const cardId = $('newCardId').value.trim();
  const name = $('newCardName').value.trim();
  if (!cardId||!name) { showToast('卡号和姓名都要填'); return; }
  const exists = cardsData.find(c => normId(c.cardId) === normId(cardId));
  if (exists && !confirm(`卡号 ${cardId} 已绑定 "${exists.name}"，覆盖为 "${name}"？`)) return;
  showLoading();
  try {
    await fetch('/api/cards',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId,name})});
    cardsData = await fetchCards();
    saveCardsLocal();
    renderCards();
    renderSwipes();
    $('newCardId').value = '';
    $('newCardName').value = '';
    showToast('已添加 ✓');
  } catch(e) { showToast('失败: '+e.message); }
  finally { hideLoading(); }
}

async function deleteCard(i) {
  const c = cardsData[i];
  if (!confirm(`删除 ${c.cardId} (${c.name})？`)) return;
  showLoading();
  try {
    await fetch('/api/cards',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:c.cardId})});
    cardsData = await fetchCards();
    saveCardsLocal();
    renderCards();
    renderSwipes();
    showToast('已删除 ✓');
  } catch(e) { showToast('失败: '+e.message); }
  finally { hideLoading(); }
}

async function refreshCards() {
  // 从服务器同步，但不覆盖本地数据（服务器可能返回默认值）
  // 实际上卡片绑定只用 local，服务器同步可忽略
  showToast('卡片绑定以浏览器本地存储为准 ✓');
}

// ========================= 弹窗 =========================
function openModal(title, html, onSave) {
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = html;
  $('modalOverlay').classList.add('show');
  $('modalSave').onclick = async () => { await onSave(); closeModal(); };
}
function closeModal() { $('modalOverlay').classList.remove('show'); }
$('modalOverlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

function editGoods(i) {
  const g = data.goods[i];
  openModal('编辑货物', `
    <label>名称</label><input id="en" value="${esc(g.name)}">
    <label>图标</label><input id="ei" value="${esc(g.icon)}">
    <label>库存</label><input type="number" id="es" value="${g.stock}" min="0">
  `, async () => {
    const name = $('en').value.trim(), icon = $('ei').value.trim(), stock = parseInt($('es').value)||0;
    if (!name) { showToast('名称不能为空'); return; }
    data.goods[i] = { icon:icon||'📦', name, stock };
    saveStockLocal();
    saveStock(data.goods, data.staff).catch(()=>{});
    renderWarehouse();
    showToast('已保存 ✓');
  });
}

function editStaff(i) {
  const p = data.staff[i];
  const opts = Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${p.status===k?'selected':''}>${v.text}</option>`).join('');
  openModal(`修改 - ${p.name}`, `
    <label>姓名</label><input id="esn" value="${esc(p.name)}">
    <label>状态</label><select id="ess">${opts}</select>
  `, async () => {
    data.staff[i].name = $('esn').value.trim() || data.staff[i].name;
    data.staff[i].status = $('ess').value;
    saveStockLocal();
    saveStock(data.goods, data.staff).catch(()=>{});
    renderStaff();
    showToast('已保存 ✓');
  });
}

async function resetAllData() {
  if (!confirm('恢复默认数据？当前修改将丢失。')) return;
  data.goods = JSON.parse(JSON.stringify(DEFAULT_GOODS));
  data.staff = JSON.parse(JSON.stringify(DEFAULT_STAFF));
  saveStockLocal();
  showLoading();
  saveStock(data.goods, data.staff).catch(()=>{});
  renderWarehouse();
  renderStaff();
  hideLoading();
  showToast('已恢复 ✓');
}

// ========================= 导航 =========================
function switchPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $(id).classList.add('show');
  event.target.classList.add('active');
  if (id === 'swipe') refreshSwipes();
  if (id === 'cards') refreshCards();
}

// ========================= 初始化 =========================
// 存储优先级：localStorage > 本地 relay.js > Vercel KV
// 这样无论从哪打开网页、KV 是否正常，数据都在
const LOCAL_RELAY = 'http://192.168.31.157:3000';

// 从本地 relay.js 拉数据（同 WiFi 内可用）
async function fetchFromLocalRelay(apiPath) {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 3000);
    const res = await fetch(`${LOCAL_RELAY}${apiPath}`, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    return res.json();
  } catch (e) { return null; }
}

// 从多处数据源取数据，优先返回有数据的那个
async function fetchBestData(apiPath, vercelFetcher) {
  // 1. 先试 Vercel（快）
  try {
    const result = await vercelFetcher();
    if (result && (Array.isArray(result) ? result.length : result.goods)) return { source: 'vercel', data: result };
  } catch (e) { /* ignore */ }
  // 2. Vercel 没数据，试本地 relay.js
  const local = await fetchFromLocalRelay(apiPath);
  if (local) {
    const hasData = Array.isArray(local) ? local.length : (local.goods || local.cards || local.swipes);
    if (hasData || (local.swipes && local.swipes.length)) return { source: 'local', data: local };
  }
  return { source: 'none', data: null };
}

async function init() {
  // 1. 先从 localStorage 加载（秒开，一定有）
  const hasStock = loadStockLocal();
  const hasSwipes = loadSwipesLocal();
  const hasCards = loadCardsLocal();

  try {
    showLoading();

    // 2. 从服务器同步（Vercel → 本地 relay.js 逐级降级）
    const [stockResult, swipesResult, cardsResult] = await Promise.all([
      fetchBestData('/api/stock', fetchStock),
      fetchBestData('/api/swipe', fetchSwipes),
      fetchBestData('/api/cards', fetchCards),
    ]);

    // 货物+人员：只在本地没有时用服务器的
    if (!hasStock && stockResult.data) {
      const s = stockResult.data;
      data.goods = s.goods || data.goods;
      data.staff = s.staff || data.staff;
      saveStockLocal();
    }

    // 刷卡记录：合并新记录
    if (swipesResult.data) {
      const s = (swipesResult.data.swipes || swipesResult.data);
      if (s.length) {
        const localIds = new Set(swipesData.map(r => r.cardId + r.time));
        const newOnes = s.filter(r => !localIds.has(r.cardId + r.time));
        if (newOnes.length) { swipesData = [...newOnes, ...swipesData]; saveSwipesLocal(); }
      }
    }

    // 卡片绑定：只在本地没有时用服务器的
    if (!hasCards && cardsResult.data) {
      const c = (cardsResult.data.cards || cardsResult.data);
      if (c && c.length) { cardsData = c; saveCardsLocal(); }
    }

    renderWarehouse(); renderStaff(); renderSwipes(); renderCards();
    if (stockResult.source === 'local' || swipesResult.source === 'local') {
      showToast('📡 已从本机 relay.js 同步数据');
    }
  } catch(e) {
    console.log('离线，纯本地模式');
  } finally { hideLoading(); }
}

init();

// 关闭页面前自动保存
window.addEventListener('beforeunload', () => {
  saveStockLocal();
  saveSwipesLocal();
  saveCardsLocal();
});
</script>
